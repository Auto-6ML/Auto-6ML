DEFAULT: &DEFAULT
  black_list: [1,2,0]
  num_gpus_total: 4
  num_gpus_to_use: 1
  heads: 8
  edge_sampling_ratio: 0.9
  seed: 0
  verbose: 2
  save_model: False
  save_plot: False
  val_interval: 1

SHG: &SHG
  model_name: SHG
  <<: *DEFAULT

SHG-dblp-Node: &SHG-dblp-Node
  <<: *SHG
#deco
  nb_epochs: 500
  cfg: [64, 32]
  deg_dim: 16
  alpha: 20
  lambdintra: [0.001, 0.001, 0.001]
  fusionintra: 0
  edge_rate: 0.95
  adj_weight: 0.05
  con: 10
  positive_rate: 0.2
  std_w: 0

